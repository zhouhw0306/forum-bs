spring:
  datasource:
    druid:
      #数据库配置
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/tp_forum?serverTimezone=GMT%2b8
      username: root
      password: 3333
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      #上传配置
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    #发送邮箱验证码配置
    host: smtp.163.com
    username: 你的邮箱
    password: 秘钥
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  redis:
    #Redis配置
    #Redis数据库索引（默认为0）
    database: 0
    host: localhost
    port: 6379
    jedis:
      pool:
        # 连接池最大连接数（使用负值表示没有限制）
        max-active: 8
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: -1ms
        # 连接池中的最大空闲连接
        max-idle: 8
        # 连接池中的最小空闲连接
        min-idle: 0
    # 连接超时时间（毫秒）
    timeout: 5000
  cache:
    # 指定spring-cache为redis
    type: redis
    redis:
      # 指定spring-cache过期时间
      time-to-live: 60000
      # 允许缓存空值，避免缓存穿透
      cache-null-values: true
  data:
    elasticsearch:
      repositories:
        # 是否开启es(可选项，不开启使用like模糊查询)
        enabled: false
  elasticsearch:
    uris: http://localhost:9200
  mvc:
    pathmatch:
      # 解决高版本springboot与Swagger2不兼容的问题
      matching-strategy: ant_path_matcher
mybatis-plus:
  configuration:
    #开启SQL语句打印
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  #mybatis-plus框架配置
  typeAliasesPackage: com.example.domain
  mapperLocations: classpath:mapper/*.xml
server:
  port: 8888
qiniu:
  # 七牛云 QiniuServiceImpl 记得保证地区一致 目前代码里面是华南（QiniuServiceImpl.49,52）
  AccessKey: xxx
  SecretKey: xxx
  bucket: xxx
  url: xxx
github:
  client:
    # github授权登录
    id: client_id
    secret: client_secret
  redirect:
    url: http://localhost:8081/login?type=github
xfxh:
  # 服务引擎使用 讯飞星火认知大模型V2.0，如果使用 V1.5 需要将 hostUrl 修改为 https://spark-api.xf-yun.com/v1.1/chat
  hostUrl: https://spark-api.xf-yun.com/v2.1/chat
  # 发送请求时指定的访问领域，如果是 V1.5版本 设置为 general，如果是 V2版本 设置为 generalv2
  domain: generalv2
  # 核采样阈值。用于决定结果随机性，取值越高随机性越强即相同的问题得到的不同答案的可能性越高。取值 [0,1]
  temperature: 0.5
  # 模型回答的tokens的最大长度，V1.5取值为[1,4096]，V2.0取值为[1,8192]。
  maxTokens: 2048
  # 大模型回复问题的最大响应时长，单位 s
  maxResponseTime: 60
  # 允许同时连接大模型的 websocket 数，如果是普通（免费）用户为 2，超过这个数连接响应会报错，具体参考官网。
  QPS: 2
  # 用于权限验证，从服务接口认证信息中获取
  appId: 4bbd332e
  # 用于权限验证，从服务接口认证信息中获取
  apiKey: xxx
  # 用于权限验证，从服务接口认证信息中获取
  apiSecret: xxx